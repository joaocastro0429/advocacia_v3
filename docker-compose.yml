services:
  db:
    image: postgres:17
    container_name: advocacia-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: advocacia
      POSTGRES_PASSWORD: advocacia@ad
      POSTGRES_DB: advocacia
    ports:
      - "5433:5432"
    volumes:
      - advocacia_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U advocacia -d advocacia"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backEnd
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "10000:10000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://advocacia:advocacia%40ad@db:5432/advocacia?schema=public
      JWT_SECRET: dev-secret-change-in-production
      JWT_RESET_SECRET: dev-reset-secret-change-in-production
      PORT: 10000
      CORS_ORIGIN: http://localhost
      FRONTEND_URL: http://localhost/login

  frontend:
    build:
      context: ./frontEnd
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: advocacia-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  advocacia_pgdata:
