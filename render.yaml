services:
  - type: web
    name: advocacia-backend
    runtime: node
    plan: free
    rootDir: backEnd
    buildCommand: npm ci --include=dev && npx prisma generate
    startCommand: npx prisma migrate deploy && npm run start
    healthCheckPath: /health

    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_RESET_SECRET
        generateValue: true
      # Ajuste para a URL final do seu frontend no Render (ou use '*' temporariamente).
      - key: CORS_ORIGINS
        value: https://advocacia-frontend-f86x.onrender.com
      - key: FRONTEND_URL
        value: https://advocacia-frontend-f86x.onrender.com
      # E-mail (opcional)
      - key: MAIL_PROVIDER
        value: smtp
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false

  - type: web
    name: advocacia-frontend
    runtime: static
    rootDir: frontEnd
    buildCommand: npm ci --include=dev && npm run build
    staticPublishPath: dist

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_API_URL
        value: https://advocacia-backend-wpd1.onrender.com/api
