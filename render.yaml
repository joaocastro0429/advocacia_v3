databases:
  - name: advocacia-postgres
    databaseName: advocacia
    plan: free

services:
  - type: web
    name: advocacia-backend
    runtime: node
    plan: free
    rootDir: backEnd
    buildCommand: npm ci --include=dev
    startCommand: "sh -c 'npx prisma generate && if [ \"$RESET_DB\" = \"true\" ]; then npx prisma migrate reset --force; fi; npx prisma migrate deploy && npm run start'"
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: advocacia-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_RESET_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://advocacia-frontend-f86x.onrender.com
      - key: FRONTEND_URL
        value: https://advocacia-frontend-f86x.onrender.com
      - key: RESET_DB
        value: false
      - key: MAIL_PROVIDER
        value: smtp
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false

  - type: static
    name: advocacia-frontend
    rootDir: frontEnd
    buildCommand: npm ci --include=dev && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://advocacia-backend-wpd1.onrender.com/api
