services:
  - type: web
    name: backend-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    plan: free

    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        fromDatabase:
          name: advocacia-db
          property: connectionString

      - key: JWT_SECRET
        generateValue: true

      - key: PORT
        value: 10000

  - type: web
    name: frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free

    envVars:
      - key: VITE_API_URL
        value: https://backend-api.onrender.com

databases:
  - name: advocacia-db
    plan: free
