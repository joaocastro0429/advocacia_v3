databases:
  - name: advocacia-postgres
    databaseName: advocacia
    plan: free

services:
  - type: web
    name: advocacia-backend
    runtime: node
    plan: free
    rootDir: backEnd
    buildCommand: npm ci --include=dev && npx prisma generate
    startCommand: sh -c 'if [ -z "$DATABASE_URL" ]; then echo "DATABASE_URL is required. Configure it or attach a Render Postgres database."; exit 1; fi; if [ "$RESET_DB" = "true" ]; then npx prisma migrate reset --force; fi; npx prisma migrate deploy && npm run start'
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: advocacia-postgres
          property: connectionString
      - key: RESET_DB
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_RESET_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: MAIL_PROVIDER
        value: smtp
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false

  - type: web
    name: advocacia-frontend
    runtime: static
    rootDir: frontEnd
    buildCommand: npm ci --include=dev && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_API_URL
        sync: false
