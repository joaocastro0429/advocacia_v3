services:
  - type: web
    name: backend-api
    runtime: node
    rootDir: backEnd
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: advocacia-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: "*"
      - key: FRONTEND_URL
        value: https://advocacia-frontend-a1ro.onrender.com/login

  - type: web
    name: frontend
    rootDir: frontEnd
    runtime: docker
    dockerfilePath: ./frontEnd/Dockerfile

    envVars:
      - key: VITE_API_URL
        value: https://backend-api.onrender.com/api

databases:
  - name: advocacia-db
